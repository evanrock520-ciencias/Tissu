name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            cmake \
            build-essential \
            libopenexr-dev \
            libilmbase-dev \
            libboost-dev \
            libpython3-dev \
            pybind11-dev \
            libomp-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libgl1-mesa-dev \
            git

      - name: Install Alembic from source
        run: |
          git clone https://github.com/alembic/alembic.git
          cd alembic
          git checkout 1.8.6
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_TESTS=OFF \
            -DALEMBIC_ILMBASE_LINK_STATIC=OFF
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Configure
        run: |
          mkdir build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DTISSU_BUILD_VIEWER=OFF

      - name: Build
        run: |
          cd build
          make -j$(nproc)

      - name: Test
        run: |
          cd build
          ./tests/unit_tests